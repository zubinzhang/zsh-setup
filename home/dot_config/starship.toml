# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'
format = """
$time \
$username\
$hostname\
$directory\
$git_branch\
$cmd_duration \
$character
❯ """
add_newline = true

[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold red"

[character]
error_symbol = "[❌](bold red)"
#success_symbol = "[⚡](bold green)" 
success_symbol = "[✨](bold green)" 
#success_symbol = "[✅](bold green)" 

[cmd_duration]
min_time = 0  # Show command duration over 10,000 milliseconds (=10 sec)
format = " <took [$duration]($style)>"
style = "bold green"

[directory]
truncation_length = 0
truncate_to_repo = false
format = "[ $path]($style)[$lock_symbol]($lock_style)"
style = "bold cyan"

[git_branch]
symbol = " 🌳 "
style = "bold yellow"
format = "[$symbol$branch]($style)"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
conflicted = "⚔️ "
ahead = "🏎️ 💨 ×${count}"
behind = "🐢 ×${count}"
diverged = "🔱 🏎️ 💨 ×${ahead_count} 🐢 ×${behind_count}"
untracked = "🛤️  ×${count}"
stashed = "📦 ×${count}"
modified = "📝 ×${count}"
staged = "🗃️  ×${count}"
renamed = "📛 ×${count}"
deleted = "🗑️  ×${count}"
style = "bright-white"
format = "$all_status$ahead_behind"

[hostname]
ssh_only = true
format = "@[$hostname]($style)"
trim_at = "-"
style = "bold dimmed white"
disabled = false

[julia]
format = "[$symbol$version]($style) "
symbol = "ஃ "
style = "bold green"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 70
style = "bold dimmed white"
disabled = false


[username]
style_user = "green"
show_always = true
format = "[$user]($style) "

[time]
disabled = false
time_format = "[%Y-%m-%d %H:%M:%S]" # Hour:Minute Format
format = '[$time]($style)'
style = "white"
